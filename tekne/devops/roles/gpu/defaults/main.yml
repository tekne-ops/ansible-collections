---
# defaults file for ./ansible-role-gpu

# Discrete NVIDIA only (desktop)
gpu_nvidia_hostnames:
  - YUGEN

# Hybrid Intel iGPU + NVIDIA dGPU (laptop gaming)
gpu_hybrid_hostnames:
  - ASTER

# Intel/Mesa only
gpu_intel_hostnames:
  - THEMIS
  - HEPHAESTUS
  - KVM

# NVIDIA packages (YUGEN discrete, ASTER hybrid)
gpu_nvidia_packages:
  - lib32-opencl-nvidia-tkg
  - lib32-vulkan-icd-loader
  - lib32-nvidia-utils-tkg
  - nvidia-open-dkms-tkg
  - nvidia-settings-tkg
  - opencl-nvidia-tkg
  - vulkan-icd-loader
  - nvidia-utils-tkg

# Extra packages for hybrid PRIME offload (ASTER)
gpu_hybrid_extra_packages:
  - nvidia-prime

# Intel/Mesa packages (THEMIS, KVM, ASTER hybrid iGPU)
gpu_intel_packages:
  - mesa
  - lib32-mesa
  - vulkan-intel
  - lib32-vulkan-intel
