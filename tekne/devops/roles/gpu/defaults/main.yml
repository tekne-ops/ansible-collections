---
# defaults file for ./ansible-role-gpu

# Hostnames that use the NVIDIA stack (must match /etc/hostname, upper case)
gpu_nvidia_hostnames:
  - YUGEN

gpu_intel_hostnames:
  - ASTER
  - THEMIS
  - HEPHAESTUS
  - KVM

# NVIDIA packages (YUGEN)
gpu_nvidia_packages:
  - lib32-opencl-nvidia-tkg
  - lib32-vulkan-icd-loader
  - lib32-nvidia-utils-tkg
  - nvidia-open-dkms-tkg
  - nvidia-settings-tkg
  - opencl-nvidia-tkg
  - vulkan-icd-loader
  - nvidia-utils-tkg

# Intel/Mesa packages (THEMIS, KVM, …)
gpu_intel_packages:
  - mesa
  - lib32-mesa
  - vulkan-intel
  - lib32-vulkan-intel
