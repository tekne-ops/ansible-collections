# SPDX-License-Identifier: MIT-0
---
- name: Validate user_password for Hermes configuration
  ansible.builtin.assert:
    that:
      - user_password is defined
      - user_password | length > 0
    fail_msg: "user_password must be defined in vault (run with --ask-vault-pass)"
  become: false
  tags:
    - hermes
    - configure

- name: Wait for SSH on Hermes instance (port {{ hermes_ssh_port_initial }})
  ansible.builtin.wait_for:
    host: "{{ hermes_public_ip }}"
    port: "{{ hermes_ssh_port_initial }}"
    delay: 10
    timeout: "{{ hermes_ssh_wait_timeout }}"
  delegate_to: localhost
  become: false
  tags:
    - hermes
    - configure

- name: Probe Hermes SSH bootstrap user
  ansible.builtin.command:
    argv: >-
      {{
        ['ssh', '-o', 'BatchMode=yes', '-o', 'StrictHostKeyChecking=no',
         '-o', 'UserKnownHostsFile=/dev/null', '-p', hermes_ssh_port_initial | string]
        + (['-i', hermes_ssh_private_key_file] if (hermes_ssh_private_key_file | default('') | length > 0) else [])
        + [item + '@' + hermes_public_ip, 'id', '-u']
      }}
  loop: "{{ hermes_ssh_user_candidates }}"
  register: hermes_ssh_user_probe
  failed_when: false
  changed_when: false
  delegate_to: localhost
  become: false
  when: hermes_ssh_user | default('') | length == 0
  tags:
    - hermes
    - configure

- name: Set Hermes SSH bootstrap user from probe
  ansible.builtin.set_fact:
    hermes_ssh_user_resolved: "{{ hermes_ssh_user_probe.results | selectattr('rc', 'equalto', 0) | map(attribute='item') | first }}"
  when: hermes_ssh_user | default('') | length == 0
  tags:
    - hermes
    - configure

- name: Use configured Hermes SSH bootstrap user
  ansible.builtin.set_fact:
    hermes_ssh_user_resolved: "{{ hermes_ssh_user }}"
  when: hermes_ssh_user | default('') | length > 0
  tags:
    - hermes
    - configure

- name: Fail when no Hermes SSH bootstrap user responds
  ansible.builtin.fail:
    msg: >-
      Could not SSH to {{ hermes_public_ip }}:{{ hermes_ssh_port_initial }} as any of
      {{ hermes_ssh_user_candidates }}. Verify the EC2 key pair private key
      (hermes_ssh_private_key_file / ansible.cfg private_key_file).
  when: hermes_ssh_user_resolved | default('') | length == 0
  tags:
    - hermes
    - configure

- name: Resolve Hermes bootstrap user uid
  ansible.builtin.command:
    argv: >-
      {{
        ['ssh', '-o', 'BatchMode=yes', '-o', 'StrictHostKeyChecking=no',
         '-o', 'UserKnownHostsFile=/dev/null', '-p', hermes_ssh_port_initial | string]
        + (['-i', hermes_ssh_private_key_file] if (hermes_ssh_private_key_file | default('') | length > 0) else [])
        + [hermes_ssh_user_resolved + '@' + hermes_public_ip, 'id', '-u']
      }}
  register: hermes_bootstrap_uid_probe
  changed_when: false
  delegate_to: localhost
  become: false
  tags:
    - hermes
    - configure

- name: Set Hermes bootstrap user uid
  ansible.builtin.set_fact:
    hermes_bootstrap_uid: "{{ hermes_bootstrap_uid_probe.stdout | trim }}"
  tags:
    - hermes
    - configure

- name: Probe passwordless sudo on Hermes bootstrap user
  ansible.builtin.command:
    argv: >-
      {{
        ['ssh', '-o', 'BatchMode=yes', '-o', 'StrictHostKeyChecking=no',
         '-o', 'UserKnownHostsFile=/dev/null', '-p', hermes_ssh_port_initial | string]
        + (['-i', hermes_ssh_private_key_file] if (hermes_ssh_private_key_file | default('') | length > 0) else [])
        + [hermes_ssh_user_resolved + '@' + hermes_public_ip, 'sudo', '-n', 'id', '-u']
      }}
  register: hermes_sudo_probe
  failed_when: false
  changed_when: false
  delegate_to: localhost
  become: false
  when: hermes_bootstrap_uid | default('') != '0'
  tags:
    - hermes
    - configure

- name: Set Hermes SSH connection facts
  ansible.builtin.set_fact:
    hermes_ssh_user_effective: "{{ hermes_ssh_user_resolved }}"
    hermes_ssh_target: "{{ hermes_ssh_user_resolved }}@{{ hermes_public_ip }}"
    hermes_ssh_argv: >-
      {{
        ['ssh', '-o', 'BatchMode=yes', '-o', 'StrictHostKeyChecking=no',
         '-o', 'UserKnownHostsFile=/dev/null', '-p', hermes_ssh_port_initial | string]
        + (['-i', hermes_ssh_private_key_file] if (hermes_ssh_private_key_file | default('') | length > 0) else [])
      }}
    hermes_scp_argv: >-
      {{
        ['scp', '-o', 'BatchMode=yes', '-o', 'StrictHostKeyChecking=no',
         '-o', 'UserKnownHostsFile=/dev/null', '-P', hermes_ssh_port_initial | string]
        + (['-i', hermes_ssh_private_key_file] if (hermes_ssh_private_key_file | default('') | length > 0) else [])
      }}
    hermes_remote_sudo: "{{ 'sudo -n' if hermes_bootstrap_uid != '0' else '' }}"
    hermes_remote_sudo_prefix: "{{ 'sudo -n ' if hermes_bootstrap_uid != '0' else '' }}"
    hermes_remote_path: /usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
  tags:
    - hermes
    - configure

- name: Fail when Hermes bootstrap user cannot escalate privileges
  ansible.builtin.fail:
    msg: >-
      Connected to {{ hermes_public_ip }} as {{ hermes_ssh_user_resolved }}, but
      passwordless sudo is unavailable. Terminate and recreate the instance so
      cloud-init user_data can grant sudo, or SSH in manually and run:
      echo "{{ hermes_ssh_user_resolved }} ALL=(ALL) NOPASSWD:ALL" > /etc/sudoers.d/99-ansible-bootstrap
      && chmod 0440 /etc/sudoers.d/99-ansible-bootstrap
  when:
    - hermes_bootstrap_uid | default('') != '0'
    - hermes_sudo_probe.rc | default(1) != 0
  tags:
    - hermes
    - configure

- name: Ensure Hermes user supplementary groups exist
  ansible.builtin.command:
    argv: "{{ hermes_ssh_argv + [hermes_ssh_target, hermes_remote_sudo_prefix + 'bash -c ' + (hermes_remote_script | quote)] }}"
  vars:
    hermes_remote_script: >-
      export PATH={{ hermes_remote_path }};
      for g in {{ hermes_supplementary_groups | join(' ') }}; do
        getent group "$g" >/dev/null || groupadd "$g";
      done
  when: hermes_supplementary_groups | length > 0
  changed_when: true
  delegate_to: localhost
  become: false
  tags:
    - hermes
    - configure

- name: Create users on Hermes instance
  ansible.builtin.command:
    argv: "{{ hermes_ssh_argv + [hermes_ssh_target, hermes_remote_sudo_prefix + 'bash -c ' + (hermes_remote_script | quote)] }}"
  vars:
    hermes_useradd_groups: "{{ '-G ' + item.groups if (item.groups | default('') | length > 0) else '' }}"
    hermes_remote_script: >-
      export PATH={{ hermes_remote_path }};
      id -u {{ item.name }} >/dev/null 2>&1 || useradd -m -s /bin/bash {{ hermes_useradd_groups }} {{ item.name }};
      usermod -p {{ user_password | quote }} {{ item.name }}
  loop: "{{ hermes_users }}"
  loop_control:
    label: "{{ item.name }}"
  changed_when: true
  delegate_to: localhost
  become: false
  tags:
    - hermes
    - configure

- name: Configure authorized SSH keys on Hermes instance
  ansible.builtin.command:
    argv: "{{ hermes_ssh_argv + [hermes_ssh_target, hermes_remote_sudo_prefix + 'bash -c ' + (hermes_remote_script | quote)] }}"
  vars:
    hermes_remote_script: >-
      export PATH={{ hermes_remote_path }};
      install -d -m 700 -o {{ item.name }} -g {{ item.name }} /home/{{ item.name }}/.ssh;
      printf '%s\n' {{ lookup('file', role_path + '/files/' + item.ssh_key_file) | to_json }} > /home/{{ item.name }}/.ssh/authorized_keys;
      chown {{ item.name }}:{{ item.name }} /home/{{ item.name }}/.ssh/authorized_keys;
      chmod 600 /home/{{ item.name }}/.ssh/authorized_keys
  loop: "{{ hermes_users }}"
  loop_control:
    label: "{{ item.name }}"
  changed_when: true
  delegate_to: localhost
  become: false
  tags:
    - hermes
    - configure

- name: Copy sudoers files to Hermes instance
  ansible.builtin.command:
    argv: "{{ hermes_scp_argv + [role_path + '/files/' + item.src, hermes_ssh_target + ':/tmp/' + item.dest] }}"
  loop:
    - { src: sudo_dvaliente, dest: sudo_dvaliente }
    - { src: sudo_devops, dest: sudo_devops }
  loop_control:
    label: "{{ item.dest }}"
  changed_when: true
  delegate_to: localhost
  become: false
  tags:
    - hermes
    - configure

- name: Install sudoers files on Hermes instance
  ansible.builtin.command:
    argv: "{{ hermes_ssh_argv + [hermes_ssh_target, hermes_remote_sudo_prefix + 'bash -c ' + (hermes_remote_script | quote)] }}"
  vars:
    hermes_remote_script: >-
      export PATH={{ hermes_remote_path }};
      install -o root -g root -m 0440 /tmp/{{ item.dest }} /etc/sudoers.d/{{ item.dest }};
      visudo -cf /etc/sudoers.d/{{ item.dest }}
  loop:
    - { dest: sudo_dvaliente }
    - { dest: sudo_devops }
  loop_control:
    label: "{{ item.dest }}"
  changed_when: true
  delegate_to: localhost
  become: false
  tags:
    - hermes
    - configure

- name: Install Docker on Hermes instance
  ansible.builtin.command:
    argv: "{{ hermes_ssh_argv + [hermes_ssh_target, hermes_remote_sudo_prefix + 'bash -c ' + (hermes_remote_script | quote)] }}"
  vars:
    hermes_remote_script: |
      export PATH={{ hermes_remote_path }};
      export DEBIAN_FRONTEND=noninteractive;
      apt-get update;
      apt-get install -y ca-certificates curl;
      install -m 0755 -d /etc/apt/keyrings;
      curl -fsSL https://download.docker.com/linux/debian/gpg -o /etc/apt/keyrings/docker.asc;
      chmod a+r /etc/apt/keyrings/docker.asc;
      . /etc/os-release;
      codename="${UBUNTU_CODENAME:-$VERSION_CODENAME}";
      arch=$(dpkg --print-architecture);
      printf '%s\n' \
        'Types: deb' \
        'URIs: https://download.docker.com/linux/debian' \
        "Suites: ${codename}" \
        'Components: stable' \
        "Architectures: ${arch}" \
        'Signed-By: /etc/apt/keyrings/docker.asc' \
        > /etc/apt/sources.list.d/docker.sources
  changed_when: true
  delegate_to: localhost
  become: false
  tags:
    - hermes
    - configure

- name: Install Docker packages on Hermes instance
  ansible.builtin.command:
    argv: "{{ hermes_ssh_argv + [hermes_ssh_target, hermes_remote_sudo_prefix + 'bash -c ' + (hermes_remote_script | quote)] }}"
  vars:
    hermes_remote_script: |
      export PATH={{ hermes_remote_path }};
      export DEBIAN_FRONTEND=noninteractive;
      apt-get update;
      apt-get install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin
  changed_when: true
  delegate_to: localhost
  become: false
  tags:
    - hermes
    - configure

- name: Enable and start Docker on Hermes instance
  ansible.builtin.command:
    argv: "{{ hermes_ssh_argv + [hermes_ssh_target, hermes_remote_sudo_prefix + 'bash -c ' + (hermes_remote_script | quote)] }}"
  vars:
    hermes_remote_script: |
      export PATH={{ hermes_remote_path }};
      systemctl enable docker;
      systemctl start docker
  changed_when: true
  delegate_to: localhost
  become: false
  tags:
    - hermes
    - configure

- name: Add Hermes users to docker group
  ansible.builtin.command:
    argv: "{{ hermes_ssh_argv + [hermes_ssh_target, hermes_remote_sudo_prefix + 'bash -c ' + (hermes_remote_script | quote)] }}"
  vars:
    hermes_remote_script: |
      export PATH={{ hermes_remote_path }};
      getent group docker >/dev/null || groupadd docker;
      usermod -aG docker {{ item.name }}
  loop: "{{ hermes_users }}"
  loop_control:
    label: "{{ item.name }}"
  changed_when: true
  delegate_to: localhost
  become: false
  tags:
    - hermes
    - configure

- name: Copy SSH configuration to Hermes instance
  ansible.builtin.command:
    argv: "{{ hermes_scp_argv + [role_path + '/files/ssh.conf', hermes_ssh_target + ':/tmp/hermes-ssh.conf'] }}"
  changed_when: true
  delegate_to: localhost
  become: false
  tags:
    - hermes
    - configure

- name: Install SSH configuration on Hermes instance
  ansible.builtin.command:
    argv: "{{ hermes_ssh_argv + [hermes_ssh_target, hermes_remote_sudo_prefix + 'bash -c ' + (hermes_remote_script | quote)] }}"
  vars:
    hermes_remote_script: >-
      export PATH={{ hermes_remote_path }};
      install -d -m 0755 /etc/ssh/sshd_config.d;
      install -o root -g root -m 0644 /tmp/hermes-ssh.conf /etc/ssh/sshd_config.d/hermes.conf
  changed_when: true
  delegate_to: localhost
  become: false
  tags:
    - hermes
    - configure

- name: Copy SSH disable-admin configuration to Hermes instance
  ansible.builtin.command:
    argv: "{{ hermes_scp_argv + [role_path + '/files/ssh_disable_admin.conf', hermes_ssh_target + ':/tmp/hermes-ssh-disable-admin.conf'] }}"
  changed_when: true
  delegate_to: localhost
  become: false
  tags:
    - hermes
    - configure

- name: Install SSH disable-admin configuration on Hermes instance
  ansible.builtin.command:
    argv: "{{ hermes_ssh_argv + [hermes_ssh_target, hermes_remote_sudo_prefix + 'bash -c ' + (hermes_remote_script | quote)] }}"
  vars:
    hermes_remote_script: >-
      export PATH={{ hermes_remote_path }};
      install -d -m 0755 /etc/ssh/sshd_config.d;
      install -o root -g root -m 0644 /tmp/hermes-ssh-disable-admin.conf /etc/ssh/sshd_config.d/disable-admin.conf
  changed_when: true
  delegate_to: localhost
  become: false
  tags:
    - hermes
    - configure

- name: Restart sshd on Hermes instance
  ansible.builtin.command:
    argv: "{{ hermes_ssh_argv + [hermes_ssh_target, hermes_remote_sudo_prefix + 'bash -c ' + (hermes_remote_script | quote)] }}"
  vars:
    hermes_remote_script: "export PATH={{ hermes_remote_path }}; systemctl restart sshd"
  changed_when: true
  delegate_to: localhost
  become: false
  tags:
    - hermes
    - configure

- name: Wait for SSH on Hermes instance (port {{ hermes_ssh_port }})
  ansible.builtin.wait_for:
    host: "{{ hermes_public_ip }}"
    port: "{{ hermes_ssh_port }}"
    delay: 5
    timeout: "{{ hermes_ssh_wait_timeout }}"
  delegate_to: localhost
  become: false
  tags:
    - hermes
    - configure
