---
# tasks file for consul

- name: Create consul directory
  ansible.builtin.file:
    path: "{{ consul_directory }}"
    state: directory
    owner: root
    group: root
    mode: '0755'
  tags:
    - consul
    - config

- name: Check if consul container already exists
  ansible.builtin.command: docker ps -a -f name=^consul$ --format '{{ "{{" }}.Names{{ "}}" }}'
  register: consul_container_check
  changed_when: false
  failed_when: false
  tags:
    - consul
    - docker

- name: Create and start consul Docker container
  ansible.builtin.shell: |
    docker run -d --name consul --restart=unless-stopped \
      --net {{ consul_docker_network }} --ip {{ consul_docker_ip }} \
      -v /srv/docker/consul/data:/consul/data \
      -v /srv/docker/consul/config:/consul/config \
      {{ consul_docker_image }}
  when: (consul_container_check.stdout | trim) != 'consul'
  register: consul_container_created
  tags:
    - consul
    - docker

- name: Wait for consul container to be available
  ansible.builtin.command: docker exec consul true
  register: consul_wait
  until: consul_wait.rc == 0
  retries: 12
  delay: 5
  changed_when: false
  when: (consul_container_check.stdout | trim) == 'consul' or consul_container_created is changed
  tags:
    - consul
    - docker
    - config

- name: Copy base.hcl to consul config directory
  ansible.builtin.copy:
    src: base.hcl
    dest: "{{ consul_directory }}/base.hcl"
    owner: root
    group: root
    mode: '0644'
  register: copy_base_hcl
  tags:
    - consul
    - config

# ---------------------------------------------------------------------------
# TLS: create certs directory, CA, rename, server cert, copy tls.hcl, restart
# ---------------------------------------------------------------------------

- name: Create consul config certs directory
  ansible.builtin.file:
    path: "{{ consul_directory }}/certs"
    state: directory
    owner: root
    group: root
    mode: '0755'
  tags:
    - consul
    - config
    - tls

- name: Check if consul TLS CA already exists
  ansible.builtin.stat:
    path: "{{ consul_directory }}/certs/{{ consul_tls_domain }}-agent-ca.pem"
  register: consul_tls_ca_file
  tags:
    - consul
    - tls

- name: Run consul tls ca create in certs directory
  ansible.builtin.shell: |
    docker exec consul sh -c 'mkdir -p /consul/config/certs && cd /consul/config/certs && consul tls ca create'
  when: not consul_tls_ca_file.stat.exists
  tags:
    - consul
    - tls

- name: Rename CA files to domain-named files
  ansible.builtin.shell: |
    docker exec consul sh -c 'cd /consul/config/certs && mv consul-agent-ca.pem {{ consul_tls_domain }}-agent-ca.pem && mv consul-agent-ca-key.pem {{ consul_tls_domain }}-agent-ca-key.pem'
  when: not consul_tls_ca_file.stat.exists
  tags:
    - consul
    - tls

- name: Run consul tls cert create (server) in certs directory
  ansible.builtin.shell: |
    docker exec consul sh -c 'cd /consul/config/certs && consul tls cert create -server -dc {{ consul_tls_dc }} -domain {{ consul_tls_domain }}'
  when: not consul_tls_ca_file.stat.exists
  register: consul_tls_cert_created
  tags:
    - consul
    - tls

- name: Copy tls.hcl to consul config directory
  ansible.builtin.copy:
    src: tls.hcl
    dest: "{{ consul_directory }}/tls.hcl"
    owner: root
    group: root
    mode: '0644'
  register: copy_tls_hcl
  tags:
    - consul
    - config
    - tls

- name: Restart consul container
  ansible.builtin.command: docker restart consul
  when: >
    (copy_base_hcl is changed or copy_tls_hcl is changed or (consul_tls_cert_created is defined and consul_tls_cert_created is changed))
    and ((consul_container_check.stdout | trim) == 'consul' or consul_container_created is changed)
  tags:
    - consul
    - config

# ---------------------------------------------------------------------------
# ACL bootstrap: run once, save token to config directory
# ---------------------------------------------------------------------------
# We run bootstrap when the token file is missing or empty (empty = failed save
# or no output from consul acl bootstrap). We only write the file when we have
# non-empty content so we never create an empty file and get stuck.

- name: Check if consul ACL bootstrap result already exists
  ansible.builtin.stat:
    path: "{{ consul_directory }}/bootstrap_token.txt"
  register: consul_bootstrap_file
  tags:
    - consul
    - config
    - bootstrap

- name: Run consul acl bootstrap in container
  ansible.builtin.command: docker exec consul consul acl bootstrap
  register: consul_acl_bootstrap
  changed_when: consul_acl_bootstrap.rc == 0
  failed_when: false
  when: not consul_bootstrap_file.stat.exists or (consul_bootstrap_file.stat.size | default(0)) == 0
  tags:
    - consul
    - config
    - bootstrap

- name: Save consul ACL bootstrap result to config directory
  ansible.builtin.copy:
    content: "{{ (consul_acl_bootstrap.stdout | default('')) + (consul_acl_bootstrap.stderr | default('')) }}"
    dest: "{{ consul_directory }}/bootstrap_token.txt"
    mode: '0600'
    owner: root
    group: root
  when:
    - not consul_bootstrap_file.stat.exists or (consul_bootstrap_file.stat.size | default(0)) == 0
    - consul_acl_bootstrap.skipped is not defined or not consul_acl_bootstrap.skipped
    - (consul_acl_bootstrap.stdout | default('')) | length > 0 or (consul_acl_bootstrap.stderr | default('')) | length > 0
  tags:
    - consul
    - config
    - bootstrap
