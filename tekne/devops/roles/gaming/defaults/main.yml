---
# defaults file for ./ansible-role-gaming

# Gaming packages to install
gaming_packages:
  - lutris
  - steam
  - ttf-liberation
  - lib32-systemd
  - wine-tkg-valve-exp-bleeding
  - winetricks
  - wine-gecko
  - wine-mono
  - openbox
  - gamemode
  - proton-ge-custom-bin
  - noto-fonts
  - noto-fonts-cjk
  - noto-fonts-emoji
  - ttf-ms-win10-auto
  - lib32-pcsclite

# Hostnames that receive YUGEN NVIDIA Xorg tuning and gaming limits
gaming_hosts:
  - YUGEN

# File destinations
gaming_xorg_conf_dest: /etc/X11/xorg.conf.d/20-yugen-nvidia.conf
gaming_limits_conf_dest: /etc/security/limits.d/gaming.conf
gaming_script_dest: /usr/local/bin/game
